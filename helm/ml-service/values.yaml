replicaCount: 1

image:
  repository: your-dockerhub-user/ml-service
  tag: "1.0.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: true
  className: ""
  host: ml-service.local
  path: /

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  APP_DB_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/ml_service_db
