version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: dataops-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  mlflow:
    build:
      context: ./services/mlflow
    container_name: dataops-mlflow
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${MLFLOW_PORT}:5000"
    command:
      - mlflow
      - server
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --backend-store-uri
      - postgresql://postgres:postgres@postgres:5432/mlflow
      - --artifacts-destination
      - /mlflow/artifacts
    volumes:
      - mlflow_data:/mlruns

  airflow-init:
    build:
      context: ./services/airflow
    container_name: dataops-airflow-init
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${AIRFLOW_DB}
    volumes:
      - ./services/airflow/dags:/opt/airflow/dags

  airflow-webserver:
    build:
      context: ./services/airflow
    container_name: dataops-airflow-webserver
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "${AIRFLOW_PORT}:8080"
    command: airflow webserver
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${AIRFLOW_DB}
    volumes:
      - ./services/airflow/dags:/opt/airflow/dags

  airflow-scheduler:
    build:
      context: ./services/airflow
    container_name: dataops-airflow-scheduler
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: airflow scheduler
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${AIRFLOW_DB}
    volumes:
      - ./services/airflow/dags:/opt/airflow/dags

  airflow-triggerer:
    build:
      context: ./services/airflow
    container_name: dataops-airflow-triggerer
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: airflow triggerer
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${AIRFLOW_DB}
    volumes:
      - ./services/airflow/dags:/opt/airflow/dags

  minio:
    image: minio/minio:latest
    container_name: dataops-minio
    restart: unless-stopped
    env_file:
      - .env
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data

  lakefs:
    image: treeverse/lakefs:latest
    container_name: dataops-lakefs
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "${LAKEFS_PORT}:8000"
    environment:
      LAKEFS_DATABASE_TYPE: postgres
      LAKEFS_DATABASE_POSTGRES_CONNECTION_STRING: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/${LAKEFS_DB}?sslmode=disable
      LAKEFS_BLOCKSTORE_TYPE: s3
      LAKEFS_BLOCKSTORE_S3_ENDPOINT: http://minio:9000
      LAKEFS_BLOCKSTORE_S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      LAKEFS_BLOCKSTORE_S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      LAKEFS_BLOCKSTORE_S3_BUCKET_NAME: ${LAKEFS_BLOCKSTORE_BUCKET}
      LAKEFS_BLOCKSTORE_S3_REGION: us-east-1
      LAKEFS_AUTH_ENCRYPT_SECRET_KEY: 12345678901234567890123456789012
      LAKEFS_LOG_LEVEL: INFO
      LAKEFS_STATS_ENABLED: 'false'
      LAKEFS_INSTALLATION_USER_NAME: admin
      LAKEFS_INSTALLATION_ACCESS_KEY_ID: ${LAKEFS_ACCESS_KEY_ID}
      LAKEFS_INSTALLATION_SECRET_ACCESS_KEY: ${LAKEFS_SECRET_ACCESS_KEY}

  jupyterhub:
    build:
      context: ./services/jupyterhub
    container_name: dataops-jupyterhub
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${JUPYTERHUB_PORT}:8000"
    volumes:
      - ./services/jupyterhub/jupyterhub_config.py:/srv/jupyterhub/jupyterhub_config.py
      - jupyterhub_data:/data

  ml-service:
    build:
      context: ./services/ml-service
    container_name: dataops-ml-service
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${MLSERVICE_PORT}:8000"
    environment:
      PYTHONPATH: /app
      APP_DB_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${MLSERVICE_DB}
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  prometheus:
    image: prom/prometheus:latest
    container_name: dataops-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - ml-service

  grafana:
    image: grafana/grafana:latest
    container_name: dataops-grafana
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${GRAFANA_PORT}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  mlflow_data:
  minio_data:
  jupyterhub_data:
  grafana_data:
